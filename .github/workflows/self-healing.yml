name: Self-Healing

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:
  workflow_run:
    workflows: ["Auto Deploy"]
    types: [completed]

permissions:
  contents: write
  issues: write

jobs:
  monitor:
    name: Monitor Deployments
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Check Pages Health
        id: pages_health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://blackroad-chrome-extension.pages.dev" || echo "000")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          echo "Pages status: $STATUS"

      - name: Check Worker Health
        id: worker_health
        run: |
          if [ ! -z "${{ secrets.WORKER_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.WORKER_URL }}/health" || echo "000")
            echo "status=$STATUS" >> $GITHUB_OUTPUT
            echo "Worker status: $STATUS"
          else
            echo "status=skip" >> $GITHUB_OUTPUT
          fi

      - name: Auto-Rollback on Failure
        if: steps.pages_health.outputs.status != '200' && steps.pages_health.outputs.status != '304'
        run: |
          echo "Pages health check failed (Status: ${{ steps.pages_health.outputs.status }})"
          echo "Triggering rollback to previous commit..."
          gh workflow run auto-deploy.yml --ref $(git rev-parse HEAD~1)
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Create Issue on Failure
        if: failure()
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'deployment,auto-generated',
              state: 'open'
            });
            if (existing.data.length === 0) {
              github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Self-Healing: Deployment Health Check Failed',
                body: `Deployment health check failed.\n\nPages Status: ${{ steps.pages_health.outputs.status }}\nWorker Status: ${{ steps.worker_health.outputs.status }}\nWorkflow: ${context.workflow}\nRun: ${context.runId}`,
                labels: ['bug', 'deployment', 'auto-generated']
              });
            }
