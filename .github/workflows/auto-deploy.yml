name: Auto Deploy

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

env:
  NODE_VERSION: '20'

jobs:
  deploy-cloudflare:
    name: Deploy to Cloudflare Pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=blackroad-chrome-extension

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Setup Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Worker Dependencies
        working-directory: worker
        run: npm ci

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: worker

  health-check:
    name: Health Check
    needs: [deploy-cloudflare, deploy-worker]
    if: always() && (needs.deploy-cloudflare.result == 'success' || needs.deploy-worker.result == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Wait for Deployment Propagation
        run: sleep 30

      - name: Check Pages Health
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://blackroad-chrome-extension.pages.dev" || echo "000")
          echo "Pages status: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "304" ]; then
            echo "Pages health check returned $STATUS"
            exit 1
          fi

      - name: Check Worker Health
        if: needs.deploy-worker.result == 'success'
        run: |
          if [ ! -z "${{ secrets.WORKER_URL }}" ]; then
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "${{ secrets.WORKER_URL }}/health" || echo "000")
            echo "Worker status: $STATUS"
            if [ "$STATUS" != "200" ]; then
              echo "Worker health check returned $STATUS"
              exit 1
            fi
          fi
